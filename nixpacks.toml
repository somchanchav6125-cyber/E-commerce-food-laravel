[phases.setup]
nixPkgs = ["php84" "php84Packages.composer" "nodejs_22"]
aptPkgs = ["libpng-dev" "libjpeg-dev" "libfreetype6-dev" "libzip-dev"]

[phases.install]
cmds = [
  "composer install --optimize-autoloader --no-dev",
  "npm install",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && /start-container.sh"
